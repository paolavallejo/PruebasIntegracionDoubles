name: CI - Integration with Fake

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run integration test with fake
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE
          pytest test_integration_with_fake.py -v
